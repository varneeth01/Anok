kind = "web"
previewPath = "/"
title = "ANOK - Gaming & Esports Platform"
version = "1.0.0"
id = "artifacts/anok"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20102

[services.development]
run = "pnpm --filter @workspace/anok run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anok", "run", "build" ]
publicDir = "artifacts/anok/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20102"
BASE_PATH = "/"
